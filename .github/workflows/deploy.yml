name: Deploy Co-Buddy AGI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run simple test
      run: |
        python simple_test.py
    
    - name: Test evolution system
      run: |
        cd ../Giffy
        python test_day1_simulation_standalone.py

  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: |
        docker build -t cobuddy-agi:${{ github.sha }} .
        docker tag cobuddy-agi:${{ github.sha }} cobuddy-agi:latest
    
    - name: Run container test
      run: |
        docker run -d -p 8002:8002 --name cobuddy-test cobuddy-agi:latest
        sleep 10
        curl -f http://localhost:8002/health || exit 1
        docker stop cobuddy-test
